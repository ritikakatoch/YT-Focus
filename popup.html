<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>YT Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.13);
      --text: #f0f0f0;
      --text2: #888;
      --text3: #4a4a4a;
      --red: #ff4444;
      --red-bg: rgba(255, 68, 68, 0.13);
      --red-border: rgba(255, 68, 68, 0.38);
      --green: #3ecf8e;
      --green-bg: rgba(62, 207, 142, 0.12);
      --green-border: rgba(62, 207, 142, 0.45);
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1;
    }

    .wrap {
      padding: 14px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .brand-icon {
      width: 26px;
      height: 26px;
      background: linear-gradient(135deg, #ff4444 0%, #cc1a1a 100%);
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(255, 68, 68, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 14px;
      height: 14px;
    }

    .brand-name {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: -0.2px;
    }

    /* Power button */
    #powerBtn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      outline: none;
    }

    #powerBtn svg {
      width: 13px;
      height: 13px;
      stroke: var(--text2);
      transition: stroke 0.2s;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    #powerBtn.active {
      border-color: var(--green-border);
      background: var(--green-bg);
    }

    #powerBtn.active svg {
      stroke: var(--green);
    }

    #powerBtn:not(.active) {
      border-color: var(--border2);
      background: transparent;
    }

    #powerBtn:not(.active) svg {
      stroke: var(--text3);
    }

    /* Paused overlay */
    #pausedMsg {
      display: none;
      font-size: 11px;
      text-align: center;
      color: var(--text3);
      background: var(--surface);
      border-radius: 6px;
      padding: 6px;
      margin-bottom: 12px;
    }

    #pausedMsg.show {
      display: block;
    }

    /* ── Mode strip ── */
    .modes {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 5px;
      margin-bottom: 14px;
    }

    .mode-btn {
      padding: 7px 0;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-family: inherit;
      font-size: 12px;
      font-weight: 400;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .mode-btn:hover {
      border-color: var(--border2);
      color: var(--text);
    }

    .mode-btn.active {
      border-color: var(--border2);
      background: var(--surface2);
      color: var(--text);
      font-weight: 500;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-focus {
      background: #ff6b35;
    }

    .dot-browse {
      background: #4dabf7;
    }

    .dot-zen {
      background: #3ecf8e;
    }

    /* ── Groups ── */
    .group {
      margin-bottom: 7px;
    }

    .group-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-bottom: 4px;
      padding: 0 2px;
    }

    .group-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    /* ── Toggle rows ── */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
      cursor: default;
    }

    .row:last-child {
      border-bottom: none;
    }

    .row:hover {
      background: var(--surface2);
    }

    .row-label {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 300;
      color: var(--text);
    }

    .row-label svg {
      width: 14px;
      height: 14px;
      stroke: var(--text3);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }

    /* Toggle switch */
    .tog {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .tog input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .tog-track {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      transition: background 0.2s, border-color 0.2s;
    }

    .tog-thumb {
      position: absolute;
      width: 14px;
      height: 14px;
      background: var(--text3);
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: transform 0.2s, background 0.2s;
      pointer-events: none;
    }

    .tog input:checked~.tog-track {
      background: var(--red-bg);
      border-color: var(--red-border);
    }

    .tog input:checked~.tog-thumb {
      background: var(--red);
      transform: translateX(16px);
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 11px;
      border-top: 1px solid var(--border);
    }

    .footer-count {
      font-size: 11px;
      color: var(--text3);
    }

    .footer-count em {
      font-style: normal;
      color: var(--text2);
    }

    .footer-mode {
      font-size: 11px;
      color: var(--text3);
    }

    /* Clear all button */
    #clearBtn {
      font-family: inherit;
      font-size: 11px;
      color: var(--text3);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 9px;
      cursor: pointer;
      transition: all 0.15s;
    }

    #clearBtn:hover {
      border-color: var(--border2);
      color: var(--text2);
    }
  </style>
</head>

<body>
  <div class="wrap">

    <!-- Header -->
    <div class="header">
      <div class="brand">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3.2" fill="rgba(255,255,255,0.9)" stroke="none" />
          </svg>
        </div>
        <span class="brand-name">YT Focus</span>
      </div>
      <button id="powerBtn" class="active" title="Toggle on/off">
        <svg viewBox="0 0 24 24">
          <path d="M18.36 6.64A9 9 0 1 1 5.64 6.64" />
          <line x1="12" y1="2" x2="12" y2="12" />
        </svg>
      </button>
    </div>

    <div id="pausedMsg">Extension paused — YouTube is unfiltered</div>

    <!-- Modes -->
    <div class="modes">
      <button class="mode-btn" data-mode="focus">
        <span class="dot dot-focus"></span>Focus
      </button>
      <button class="mode-btn" data-mode="browse">
        <span class="dot dot-browse"></span>Browse
      </button>
      <button class="mode-btn" data-mode="zen">
        <span class="dot dot-zen"></span>Zen
      </button>
    </div>

    <!-- Feed -->
    <div class="group">
      <div class="group-label">Feed</div>
      <div class="group-body">
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7" />
              <rect x="14" y="3" width="7" height="7" />
              <rect x="3" y="14" width="7" height="7" />
              <rect x="14" y="14" width="7" height="7" />
            </svg>
            Home feed
          </span>
          <label class="tog"><input type="checkbox" data-key="homeFeed">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <rect x="2" y="3" width="20" height="14" rx="2" />
              <path d="M8 21h8M12 17v4" />
            </svg>
            Shorts
          </span>
          <label class="tog"><input type="checkbox" data-key="shorts">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <line x1="8" y1="6" x2="21" y2="6" />
              <line x1="8" y1="12" x2="21" y2="12" />
              <line x1="8" y1="18" x2="21" y2="18" />
              <line x1="3" y1="6" x2="3.01" y2="6" />
              <line x1="3" y1="12" x2="3.01" y2="12" />
              <line x1="3" y1="18" x2="3.01" y2="18" />
            </svg>
            Sidebar &amp; up next
          </span>
          <label class="tog"><input type="checkbox" data-key="sidebar">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
      </div>
    </div>

    <!-- Watch page -->
    <div class="group">
      <div class="group-label">Watch page</div>
      <div class="group-body">
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            Comments
          </span>
          <label class="tog"><input type="checkbox" data-key="comments">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <polygon points="5 3 19 12 5 21 5 3" />
            </svg>
            Autoplay
          </span>
          <label class="tog"><input type="checkbox" data-key="autoplay">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z" />
              <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3" />
            </svg>
            Like
          </span>
          <label class="tog"><input type="checkbox" data-key="counts">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <polygon points="23 7 16 12 23 17 23 7" />
              <rect x="1" y="5" width="15" height="14" rx="2" />
            </svg>
            End cards
          </span>
          <label class="tog"><input type="checkbox" data-key="endCards">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
            </svg>
            Subscriber count
          </span>
          <label class="tog"><input type="checkbox" data-key="subscriberCount">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
      </div>
    </div>

    <!-- Distractions -->
    <div class="group">
      <div class="group-label">Distractions</div>
      <div class="group-body">
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" />
              <line x1="4.93" y1="4.93" x2="19.07" y2="19.07" />
            </svg>
            Ads
          </span>
          <label class="tog"><input type="checkbox" data-key="ads">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            Notifications
          </span>
          <label class="tog"><input type="checkbox" data-key="notifications">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
        <div class="row">
          <span class="row-label">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2" />
              <path d="M3 9h18M9 21V9" />
            </svg>
            Left navigation
          </span>
          <label class="tog"><input type="checkbox" data-key="leftNav">
            <div class="tog-track"></div>
            <div class="tog-thumb"></div>
          </label>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <span class="footer-count"><em id="countNum">0</em> hidden</span>
      <button id="clearBtn">Clear all</button>
      <span class="footer-mode" id="modeLabel">—</span>
    </div>

  </div>
  <script src="popup.js"></script>
</body>

</html>
